<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portal Klien | DIAUF.ID</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:linear-gradient(135deg,#081120,#101d34);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-box{
width:100%;
max-width:420px;
background:white;
padding:50px;
border-radius:24px;
box-shadow:0 20px 60px rgba(0,0,0,.25);
}

.logo{
font-size:38px;
font-weight:800;
text-align:center;
margin-bottom:10px;
}

.logo span{
color:#10b981;
}

.subtitle{
text-align:center;
color:#64748b;
margin-bottom:35px;
}

.input-group{
margin-bottom:18px;
}

input{
width:100%;
padding:15px;
border:1px solid #ddd;
border-radius:12px;
font-size:15px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:#10b981;
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.note{
margin-top:20px;
text-align:center;
font-size:13px;
color:#64748b;
}

</style>

</head>
<body>

<div class="login-box">

<div class="logo">
DIAUF<span>.ID</span>
</div>

<p class="subtitle">
Portal Dashboard Klien
</p>

<form>

<div class="input-group">
<input type="email" placeholder="Email">
</div>

<div class="input-group">
<input type="password" placeholder="Password">
</div>

<button type="submit">
Masuk Dashboard
</button>

</form>

<div class="note">
Khusus klien DIAUF.ID
</div>

</div>

</body>
</html>
